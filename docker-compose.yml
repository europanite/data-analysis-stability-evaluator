services:
  tests:
    build:
      context: .
      dockerfile: service/Dockerfile
    working_dir: /workspace
    command: pytest
    environment:
      PYTHONPATH: /workspace/service/src
    volumes:
      - .:/workspace

  example:
    build:
      context: .
      dockerfile: service/Dockerfile
    working_dir: /workspace
    command: python service/examples/generic_tabular_analysis.py --out reports/example
    environment:
      PYTHONPATH: /workspace/service/src
    volumes:
      - .:/workspace

  shell:
    build:
      context: .
      dockerfile: service/Dockerfile
    working_dir: /workspace
    command: bash
    environment:
      PYTHONPATH: /workspace/service/src
    volumes:
      - .:/workspace