name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,plots,sklearn]"

      - name: Run tests
        run: pytest

      - name: Lint
        run: ruff check .

      - name: Build package
        run: python -m build

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src tests examples

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install built wheel and run CLI smoke test
        shell: bash
        run: |
          set -euxo pipefail
          WHEEL="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path('dist').glob('*.whl'))
          if len(wheels) != 1:
              raise SystemExit(f'expected exactly one wheel, found {len(wheels)}')
          print(wheels[0])
          PY
          )"
          python -m venv /tmp/pkg-smoke
          . /tmp/pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$WHEEL"
          analysis-stability sample-data --out /tmp/ase-data --rows 50
          analysis-stability profile /tmp/ase-data/baseline.csv /tmp/ase-data/candidate.csv --out /tmp/ase-report/profile.json
          test -f /tmp/ase-report/profile.json

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: service/dist/*
          if-no-files-found: error

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run tests through Docker Compose
        run: docker compose run --rm tests

      - name: Run example through Docker Compose
        run: docker compose run --rm example

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down -v --remove-orphans
