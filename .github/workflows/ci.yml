name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests • ${{ matrix.os }} • py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    env:
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,plots]"

      - name: Show versions
        run: |
          python --version
          python -m pip --version
          python -m pytest --version

      - name: Run unit tests
        run: python -m pytest

      - name: CLI smoke test
        shell: bash
        run: |
          set -euxo pipefail
          analysis-stability sample-data --out tmp-ci-data --rows 80
          analysis-stability profile tmp-ci-data/baseline.csv tmp-ci-data/candidate.csv --out tmp-ci-reports/profile.json
          test -f tmp-ci-reports/profile.json

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run Ruff
        run: python -m ruff check src tests examples

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source distribution and wheel
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Install built wheel and run CLI smoke test
        shell: bash
        run: |
          set -euxo pipefail
          WHEEL="$(python - <<'PY'
          from pathlib import Path
          wheels = sorted(Path('dist').glob('*.whl'))
          if len(wheels) != 1:
              raise SystemExit(f'expected exactly one wheel, found {len(wheels)}')
          print(wheels[0])
          PY
          )"
          python -m venv /tmp/pkg-smoke
          . /tmp/pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install "$WHEEL"
          analysis-stability sample-data --out /tmp/ase-data --rows 50
          analysis-stability profile /tmp/ase-data/baseline.csv /tmp/ase-data/candidate.csv --out /tmp/ase-report/profile.json
          test -f /tmp/ase-report/profile.json

      - name: Upload package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package-distributions
          path: dist/*
          if-no-files-found: error

  docker-compose-smoke:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run tests through Docker Compose
        run: docker compose run --rm tests

      - name: Run example through Docker Compose
        run: docker compose run --rm example

      - name: Cleanup Docker Compose
        if: always()
        run: docker compose down -v --remove-orphans
